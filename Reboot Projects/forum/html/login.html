<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Web Forum</title>
    <link rel="stylesheet" href="../style/loginpage.css"> <!-- Connect to your CSS file -->
</head>
<body>

<main class="form-page">
    <div class="form-container">
        <h2>Login to Your Account</h2>
        <form action="/login" method="POST">
            <input type="text" name="email" placeholder="Enter email or username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="form-button">Login</button>
        </form>
        <div class="button-container2">
            <a href="/register">
                <button class="form-button">Register</button>
            </a>
        </div>
        
    </div>
</main>

</body>
</html>
